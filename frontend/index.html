  <head>

    <meta name="description" content="QuickBite — Queue-Aware Predictive Food Ordering. Order ahead, skip the queue, get accurate pickup times." />

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script>
      // ── Tailwind Design System (The Kinetic Hearth) ──────────
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'on-tertiary-fixed': '#2c0040',
              'on-surface': '#2c2f30',

              'secondary-fixed-dim': '#cfd6d8',
              'surface-container': '#e6e8ea',
              'on-secondary-container': '#4c5355',
              'outline-variant': '#abadae',
              'on-primary-fixed': '#000000',
              'inverse-on-surface': '#9b9d9e',
              'secondary-container': '#dde4e6',
              'on-background': '#2c2f30',
              'outline': '#757778',
              'tertiary-container': '#dc95fb',
              'surface-container-highest': '#dadddf',
              'primary': '#b22200',
              'primary-fixed': '#ff785a',
              'on-primary-fixed-variant': '#5b0c00',
              'error': '#b41340',
              'on-tertiary': '#feeeff',
              'inverse-primary': '#fe5733',
              'on-secondary-fixed': '#394043',
              'surface-dim': '#d1d5d7',
              'secondary-dim': '#4a5153',
              'on-primary-container': '#4a0800',
              'error-dim': '#a70138',
              'error-container': '#f74b6d',
              'surface-container-low': '#eff1f2',
              'on-surface-variant': '#595c5d',
              'background': '#f5f6f7',
              'surface-tint': '#b22200',
              'surface-bright': '#f5f6f7',
              'surface-container-high': '#e0e3e4',
              'on-error': '#ffefef',
              'tertiary': '#7f3f9e',
              'inverse-surface': '#0c0f10',
              'primary-fixed-dim': '#ff5c39',
              'primary-dim': '#9c1c00',
              'on-tertiary-fixed-variant': '#591779',
              'on-error-container': '#510017',
              'surface-variant': '#dadddf',
              'primary-container': '#ff785a',
              'tertiary-fixed': '#dc95fb',
              'secondary': '#565d5f',
              'on-tertiary-container': '#50086f',
              'on-secondary-fixed-variant': '#565d5f',

              'dark-bg': '#0D0D1A',

              'dark-accent': '#4F4FFF',
            },
            fontFamily: {
              headline: ['Plus Jakarta Sans', 'sans-serif'],
              body: ['Inter', 'sans-serif'],

    <style>
      /* Material Symbols default settings */
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      /* Hide scrollbars */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      /* Gradient helpers */
      .bg-primary-gradient {
        background: linear-gradient(135deg, #b22200 0%, #ff785a 100%);
      }
      .text-gradient {
        background: linear-gradient(135deg, #b22200 0%, #ff785a 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      /* Pulse animation */
      @keyframes pulse-soft {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(1.05); }
      }
      .pulse-indicator { animation: pulse-soft 2s infinite ease-in-out; }
      /* Fade in animation */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in { animation: fadeInUp 0.5s ease-out forwards; }
      /* Premium shadow */
      .premium-shadow { box-shadow: 0px 12px 32px rgba(44, 47, 48, 0.06); }
      /* Scale tap */
      .scale-tap { transition: transform 0.15s ease; }
      .scale-tap:active { transform: scale(0.96); }
      /* Dark mode token overrides */
      .dark body { background-color: #0D0D1A; color: #E8E8FF; }
      .dark .bg-surface { background-color: #0D0D1A !important; }
      .dark .bg-surface-container-lowest { background-color: #16213E !important; }
      .dark .bg-surface-container-low { background-color: #1A1A2E !important; }
      .dark .bg-surface-container { background-color: #1A1A2E !important; }
      .dark .bg-surface-container-high { background-color: #2E2E5E !important; }
      .dark .text-on-surface { color: #E8E8FF !important; }
      .dark .text-on-background { color: #E8E8FF !important; }
      .dark .text-on-surface-variant { color: #6666AA !important; }
      .dark .border-outline-variant { border-color: #2E2E5E !important; }
    </style>

  <body class="bg-slate-200 dark:bg-slate-950 font-body text-on-background min-h-screen flex justify-center">
    <div id="root" class="w-full max-w-md min-h-screen bg-surface dark:bg-dark-bg shadow-[0_0_50px_rgba(0,0,0,0.1)] relative"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
